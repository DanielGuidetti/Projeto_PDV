<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <link rel="icon" type="image/png" href="./img/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercearia - Autenticação</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div id="app">
    <main id="main-content" class="full-width">
      <!-- ====== Login Screen ====== -->
      <section id="screen-login" class="screen active">
        <div class="auth-wrapper">
          <div class="auth-card glass-card">
            <div class="auth-header">
              <div class="logo-circ"><i class="fas fa-store"></i></div>
              <h2>Bem-vindo</h2>
              <p>Faça login para gerenciar sua mercearia</p>
            </div>
            <form id="login-form">
              <div class="input-group">
                <label>E-mail</label>
                <div class="input-icon">
                  <i class="fas fa-envelope"></i>
                  <input type="email" id="login-username" placeholder="Digite seu e-mail" required>
                </div>
              </div>
              <div class="input-group">
                <label>Senha</label>
                <div class="input-icon">
                  <i class="fas fa-lock"></i>
                  <input type="password" id="login-password" placeholder="Digite sua senha" required>
                </div>
              </div>
              <button type="submit" class="btn btn-primary btn-block">Acessar Sistema</button>
            </form>
            <div class="auth-footer">
              <p>Não tem uma conta? <a href="#" class="switch-auth" data-target="screen-register">Criar nova conta</a></p>
            </div>
          </div>
        </div>
      </section>

      <!-- ====== Register Screen ====== -->
      <section id="screen-register" class="screen">
        <div class="auth-wrapper">
          <div class="auth-card glass-card">
            <div class="auth-header">
              <div class="logo-circ accent"><i class="fas fa-user-plus"></i></div>
              <h2>Criar Conta</h2>
              <p>Registre-se e comece agora</p>
            </div>
            <form id="register-form">
              <div class="input-group">
                <label>E-mail</label>
                <div class="input-icon">
                  <i class="fas fa-envelope"></i>
                  <input type="email" id="reg-username" placeholder="Escolha um e-mail" required>
                </div>
              </div>
              <div class="input-group">
                <label>Senha</label>
                <div class="input-icon">
                  <i class="fas fa-lock"></i>
                  <input type="password" id="reg-password" placeholder="Crie uma senha forte" required>
                </div>
              </div>
              <button type="submit" class="btn btn-primary btn-block">Cadastrar-se</button>
            </form>
            <div class="auth-footer">
              <p>Já possui conta? <a href="#" class="switch-auth" data-target="screen-login">Faça Login</a></p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
</body>

</html>
